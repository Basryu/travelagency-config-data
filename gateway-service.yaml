server:
  port: 8001

spring:
  application:
    name: gateway-service
  cloud:
    config:
      enabled: false

    gateway:
      discovery:
        locator:
          enabled: true

      routes:
        - id: booking-service
          uri: lb://booking-service
          predicates:
            - Path=/booking/**

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/user/**

        - id: tour-service
          uri: lb://tour-service
          predicates:
            - Path=/tour/**

        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/payment/**

        - id: report-service
          uri: lb://report-service
          predicates:
            - Path=/report/**

eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      enabled: true
